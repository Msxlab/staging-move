services:
  mysql:
    image: mysql:8.0
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
      - --slow-query-log=1
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-migrate
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    # Dokploy restores an existing production DB, including AdminUser.
    # Do not run seed-admin here; it can reset or block migrated admin access.
    command:
      - sh
      - -lc
      - pnpm --filter @locateflow/db exec prisma migrate deploy
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:?NEXT_PUBLIC_ADMIN_URL is required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        SITE_URL: ${SITE_URL:-}
        APP_ENV: ${APP_ENV:-production}
        NEXT_PUBLIC_IMGPROXY_URL: ${NEXT_PUBLIC_IMGPROXY_URL:?NEXT_PUBLIC_IMGPROXY_URL is required}
        BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-unknown}
        BUILD_SOURCE_BRANCH: ${BUILD_SOURCE_BRANCH:-unknown}
        BUILD_CREATED_AT: ${BUILD_CREATED_AT:-unknown}
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    configs:
      - source: cron_runner
        target: /usr/local/bin/locateflow-cron-runner.sh

  admin:
    build:
      context: .
      dockerfile: docker/admin.prod.Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:?NEXT_PUBLIC_ADMIN_URL is required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        SITE_URL: ${SITE_URL:-}
        APP_ENV: ${APP_ENV:-production}
        BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-unknown}
        BUILD_SOURCE_BRANCH: ${BUILD_SOURCE_BRANCH:-unknown}
        BUILD_CREATED_AT: ${BUILD_CREATED_AT:-unknown}
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 3001
      HOSTNAME: 0.0.0.0
    expose:
      - "3001"
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    configs:
      - source: cron_runner
        target: /usr/local/bin/locateflow-cron-runner.sh

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY:?IMGPROXY_KEY is required}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?IMGPROXY_SALT is required}
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${R2_ENDPOINT:?R2_ENDPOINT is required}
      IMGPROXY_S3_REGION: ${R2_REGION:-auto}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_ENABLE_AVIF_DETECTION: "true"
      IMGPROXY_STRIP_METADATA: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_MAX_SRC_FILE_SIZE: "20971520"
    expose:
      - "8080"
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cron:
    profiles:
      - cron
    image: mcuadros/ofelia:latest
    container_name: ${DOKPLOY_CONTAINER_PREFIX:-locateflow}-cron
    restart: unless-stopped
    depends_on:
      - web
      - admin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --config /etc/ofelia.conf
    configs:
      - source: ofelia
        target: /etc/ofelia.conf
    environment:
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET is required}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

configs:
  ofelia:
    file: ./docker/ofelia.ini
  cron_runner:
    file: ./docker/locateflow-cron-runner.sh

volumes:
  mysql_data:

networks:
  dokploy-network:
    external: true
