# ---------------------------------------------------------------
# LocateFlow - Dokploy production compose
#
# Use this file for Dokploy-hosted deployments. It is intentionally
# separate from docker-compose.prod.yml because Dokploy provides Traefik
# and domain management; this stack does not start Caddy.
#
# Dokploy notes:
# - Configure domains in the Dokploy UI:
#   locateflow.com -> service web, port 3000
#   admin.locateflow.com -> service admin, port 3001
#   img.locateflow.com -> service imgproxy, port 8080
# - Add web, admin, and imgproxy to dokploy-network so Traefik can reach
#   them. Internal services stay on the default project network only.
# - For a second stack on the same host, set DOKPLOY_COMPOSE_PROJECT_NAME and
#   DOKPLOY_CONTAINER_PREFIX to unique values before deploying.
# - The cron service is behind the `cron` Compose profile. Keep it disabled
#   during rehearsal deploys; enable it only after final cutover health checks
#   and after GitHub scheduled cron has been disabled.
# ---------------------------------------------------------------

