; ---------------------------------------------------------------
; LocateFlow Cron - Ofelia scheduler config
;
; Each job sends an authenticated HTTP request to the web container
; using CRON_SECRET. Schedules use standard 6-field cron (s m h D M W).
; Docs: https://github.com/mcuadros/ofelia
; ---------------------------------------------------------------

; Daily bill reminders - 08:00 UTC
[job-exec "bill-reminders"]
schedule = 0 0 8 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/bill-reminders"

; Daily overdue bill alerts - 10:00 UTC
[job-exec "bill-overdue"]
schedule = 0 0 10 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/bill-overdue"

; Daily task reminders - 08:00 UTC
[job-exec "task-reminders"]
schedule = 0 0 8 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/task-reminders"

; Weekly digest - Mondays 09:00 UTC
[job-exec "weekly-digest"]
schedule = 0 0 9 * * 1
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/weekly-digest"

; Monthly report - first day of the month, 10:00 UTC
[job-exec "monthly-report"]
schedule = 0 0 10 1 * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/monthly-report"

; Admin daily digest - daily 09:00 UTC
[job-exec "admin-daily-digest"]
schedule = 0 0 9 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/admin-daily-digest"

; Move reminders - daily 08:00 UTC
[job-exec "move-reminders"]
schedule = 0 0 8 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/move-reminders"

; Trial expiry checks - daily 06:00 UTC
[job-exec "trial-check"]
schedule = 0 0 6 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/trial-check"

; Contract expiry reminders - daily 07:00 UTC
[job-exec "contract-reminders"]
schedule = 0 0 7 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/contract-reminders"

; Provider stats refresh - daily 03:00 UTC
[job-exec "provider-stats"]
schedule = 0 0 3 * * *
container = locateflow-web
command = sh -c "wget -qO- --post-data=\"\" --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/provider-stats"

; Data retention cleanup - weekly, Sundays 04:00 UTC
[job-exec "data-retention"]
schedule = 0 0 4 * * 0
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/data-retention"

; Admin daily backup - 02:00 UTC
[job-exec "admin-backup"]
schedule = 0 0 2 * * *
container = locateflow-admin
command = sh -c "wget -qO- --post-data=\"\" --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3001/api/cron/backup"

; Blog: promote SCHEDULED to PUBLISHED - every minute
[job-exec "blog-publish"]
schedule = 0 * * * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/blog-publish"

; Blog: prune BlogView analytics older than 90 days - daily 04:30 UTC
[job-exec "blog-cleanup"]
schedule = 0 30 4 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/blog-cleanup"

; Blog: delete orphaned R2 images after the 7-day grace window - daily 04:45 UTC
[job-exec "blog-image-cleanup"]
schedule = 0 45 4 * * *
container = locateflow-admin
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3001/api/cron/blog-image-cleanup"

; Connector dispatch worker - every 10 minutes (drains the ConnectorDispatch queue)
[job-exec "connector-dispatch"]
schedule = 0 */10 * * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/connector-dispatch"

; Workspace purge - daily 03:30 UTC (hard-delete soft-deleted workspaces past the 7-day grace; GDPR)
[job-exec "workspace-purge"]
schedule = 0 30 3 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/workspace-purge"

; Stripe reconcile - daily 03:15 UTC (repair DB<->Stripe drift from dropped webhooks)
[job-exec "stripe-reconcile"]
schedule = 0 15 3 * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/stripe-reconcile"

; Checkout cleanup - every 5 minutes (expire stale PENDING_CHECKOUT so users aren't stranded)
[job-exec "checkout-cleanup"]
schedule = 0 */5 * * * *
container = locateflow-web
command = sh -c "wget -qO- --header=\"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/checkout-cleanup"
