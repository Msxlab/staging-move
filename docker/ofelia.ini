; ---------------------------------------------------------------
; LocateFlow Cron - Ofelia scheduler config
;
; Each job calls the cron runner mounted in the target app container.
; The runner sends an authenticated HTTP request using CRON_SECRET, or
; BACKUP_CRON_SECRET for admin backup when that narrower secret is set.
; Schedules use standard 6-field cron (s m h D M W).
; Docs: https://github.com/mcuadros/ofelia
; Keep shell quoting out of this file. Ofelia tokenizes command values before
; docker exec, so header quoting belongs inside docker/locateflow-cron-runner.sh.
; Scheduler ownership: use Ofelia only for self-hosted Docker. If GitHub Actions
; cron also targets the same production domain, set repository variable
; CRON_SCHEDULER_DISABLED=true or stop this service; never run both schedulers.
; ---------------------------------------------------------------

; Daily user-facing reminder batch - 12:00-18:00 UTC
; Routes self-gate by user timezone so each user is processed at local ~08:00.
[job-exec "bill-reminders"]
schedule = 0 0 12-18 * * *
container = locateflow-web
command = /bin/sh /usr/local/bin/locateflow-cron-runner.sh web /api/cron/bill-reminders

; Daily overdue bill alerts - 12:00-18:00 UTC, self-gated by local time
[job-exec "bill-overdue"]
schedule = 0 0 12-18 * * *
container = locateflow-web
command = /bin/sh /usr/local/bin/locateflow-cron-runner.sh web /api/cron/bill-overdue

; Daily task reminders - 12:00-18:00 UTC, self-gated by local time
[job-exec "task-reminders"]
schedule = 0 0 12-18 * * *
