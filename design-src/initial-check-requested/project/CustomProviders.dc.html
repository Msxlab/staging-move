<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06080f;font-family:'DM Sans',sans-serif}input{font-family:inherit}.c-scroll{scrollbar-width:none}.c-scroll::-webkit-scrollbar{display:none}@keyframes c-rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.c-rise{animation:c-rise .35s ease both}</style>
</helmet>
<div style="{{ outer }}">
  <div style="{{ frame }}">
    <sc-if value="{{ chrome }}"><div style="display:flex;justify-content:space-between;padding:14px 26px 4px;font-size:13px;font-weight:600;color:#EFF3FA"><span>9:41</span><span style="color:#41526F">▮▮▮ ▼</span></div></sc-if>
    <div class="c-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:8px 22px 28px">
      <div style="color:#EFF3FA;font-family:'Playfair Display',serif;font-size:25px;font-weight:800">Custom providers</div>
      <div style="color:#8A99B6;font-size:11px;margin-top:2px;margin-bottom:16px">Track anything that isn’t in our directory.</div>

      <sc-if value="{{ isList }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;flex-direction:column;gap:10px">
          <sc-for list="{{ items }}" as="p" hint-placeholder-count="3">
            <div class="c-rise" style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:#121B2D;border:1px solid rgba(110,150,225,0.12)">
              <div style="width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#18233A;font-size:18px">{{ p.icon }}</div>
              <div style="flex:1;min-width:0"><div style="color:#EFF3FA;font-size:14px;font-weight:700">{{ p.name }}</div><div style="color:#8A99B6;font-size:11.5px">{{ p.cat }} · {{ p.cost }}</div></div>
              <span style="font-size:9.5px;font-weight:700;color:#54CB7E;background:rgba(84,203,126,0.14);padding:4px 9px;border-radius:99px">Tracked</span>
            </div>
          </sc-for>
        </div>
        <button onClick="{{ goAdd }}" style="width:100%;margin-top:16px;padding:15px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:1px dashed rgba(203,164,94,0.4);background:rgba(203,164,94,0.08)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#CBA45E" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg><span style="color:#CBA45E;font-size:13.5px;font-weight:600">Add a custom provider</span></button>
      </sc-if>

      <sc-if value="{{ isAdd }}" hint-placeholder-val="{{ false }}">
        <div class="c-rise" style="display:flex;flex-direction:column;gap:13px">
          <div><div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">Provider name</div><input placeholder="e.g. Green Valley Composting" style="width:100%;padding:14px 15px;border-radius:13px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:14px;outline:none"/></div>
          <div><div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">Category</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px"><sc-for list="{{ cats }}" as="c" hint-placeholder-count="5"><button onClick="{{ c.go }}" style="padding:9px 14px;border-radius:99px;cursor:pointer;background:{{ c.bg }};border:1.5px solid {{ c.bd }};color:{{ c.col }};font-size:12.5px;font-weight:600">{{ c.label }}</button></sc-for></div>
          </div>
          <div><div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">Monthly cost (optional)</div><input placeholder="$0.00" style="width:100%;padding:14px 15px;border-radius:13px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:14px;outline:none"/></div>
          <button onClick="{{ goList }}" style="width:100%;margin-top:6px;padding:16px;border-radius:16px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#DCBC7C,#CBA45E,#B0852F);color:#0A0F1C;border:none;cursor:pointer">Save provider</button>
          <button onClick="{{ goList }}" style="width:100%;padding:13px;border-radius:14px;font-size:14px;font-weight:600;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#8A99B6;cursor:pointer">Cancel</button>
        </div>
      </sc-if>
    </div>
    <sc-if value="{{ chrome }}"><div style="position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:99px;background:rgba(255,255,255,0.18)"></div></sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  state={view:'list',cat:'Utilities'};
  set(v){ this.setState({view:v}); }
  setCat(c){ this.setState({cat:c}); }
  renderVals(){
    const cats=['Utilities','Home','Finance','Health','Other'].map(c=>{const on=this.state.cat===c;return {label:c,go:()=>this.setCat(c),bg:on?'rgba(203,164,94,0.12)':'#121B2D',bd:on?'#CBA45E':'rgba(110,150,225,0.12)',col:on?'#CBA45E':'#8A99B6'};});
    return {
      outer:this.props.embed?'height:100%;width:100%':'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,#14110b,#06080f 72%)', frame:this.props.embed?'position:relative;display:flex;flex-direction:column;height:100%;width:100%;background:#0A0F1C':'position:relative;width:390px;height:844px;border-radius:42px;overflow:hidden;background:#0A0F1C;border:1px solid rgba(110,150,225,0.10);box-shadow:0 40px 120px rgba(0,0,0,.6);display:flex;flex-direction:column', chrome:!this.props.embed, isList:this.state.view==='list', isAdd:this.state.view==='add',
      items:[
        {icon:'🌱',name:'Green Valley Composting',cat:'Home',cost:'$24/mo'},
        {icon:'🧹',name:'Sparkle Cleaners',cat:'Home',cost:'$120/mo'},
        {icon:'🐕',name:'Paws Dog Walking',cat:'Other',cost:'$200/mo'},
      ],
      cats,
      goAdd:()=>this.set('add'), goList:()=>this.set('list'),
    };
  }
}
</script>
</body>
</html>
