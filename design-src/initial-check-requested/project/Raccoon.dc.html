<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg width="{{ size }}" height="{{ size }}" viewBox="0 0 100 100" fill="none" style="display:block; overflow:visible">
  <path d="M18 40 L12 8 L34 24Z" fill="{{ head }}"></path>
  <path d="M19 37 L15 14 L30 24Z" fill="{{ ear }}" opacity="0.9"></path>
  <path d="M82 40 L88 8 L66 24Z" fill="{{ head }}"></path>
  <path d="M81 37 L85 14 L70 24Z" fill="{{ ear }}" opacity="0.9"></path>
  <ellipse cx="50" cy="58" rx="36" ry="31" fill="{{ head }}"></ellipse>
  <ellipse cx="50" cy="45" rx="24" ry="14" fill="#B8C2D0" opacity="0.42"></ellipse>
  <ellipse cx="18" cy="66" rx="12" ry="9" fill="#C0CAD8" opacity="0.4"></ellipse>
  <ellipse cx="82" cy="66" rx="12" ry="9" fill="#C0CAD8" opacity="0.4"></ellipse>
  <ellipse cx="33" cy="51" rx="16" ry="13" fill="{{ mask }}" transform="rotate(-6 33 51)"></ellipse>
  <ellipse cx="67" cy="51" rx="16" ry="13" fill="{{ mask }}" transform="rotate(6 67 51)"></ellipse>
  <rect x="44" y="46" width="12" height="10" rx="5" fill="{{ mask }}"></rect>
  <path d="M20 43 Q50 36 80 43" stroke="{{ mask }}" stroke-width="8" stroke-linecap="round" fill="none"></path>
  <sc-if value="{{ alert }}" hint-placeholder-val="{{ false }}">
    <path d="M21 37 Q33 31 43 35" stroke="{{ mask }}" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"></path>
    <path d="M79 37 Q67 31 57 35" stroke="{{ mask }}" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"></path>
  </sc-if>
  <circle cx="33" cy="51" r="{{ eyeR }}" fill="{{ eye }}"></circle>
  <circle cx="33" cy="51" r="{{ pupilR }}" fill="{{ pupil }}"></circle>
  <circle cx="35.5" cy="48.5" r="1.8" fill="white" opacity="0.75"></circle>
  <circle cx="67" cy="51" r="{{ eyeR }}" fill="{{ eye }}"></circle>
  <circle cx="67" cy="51" r="{{ pupilR }}" fill="{{ pupil }}"></circle>
  <circle cx="69.5" cy="48.5" r="1.8" fill="white" opacity="0.75"></circle>
  <sc-if value="{{ squint }}" hint-placeholder-val="{{ false }}">
    <line x1="25" y1="51" x2="41" y2="51" stroke="{{ mask }}" stroke-width="2" stroke-linecap="round" opacity="0.5"></line>
    <line x1="59" y1="51" x2="75" y2="51" stroke="{{ mask }}" stroke-width="2" stroke-linecap="round" opacity="0.5"></line>
  </sc-if>
  <sc-if value="{{ sparkle }}" hint-placeholder-val="{{ false }}">
    <path d="M24 37 L25.5 33 L27 37 L25.5 41Z" fill="{{ eye }}" opacity="0.9"></path>
    <path d="M73 37 L74.5 33 L76 37 L74.5 41Z" fill="{{ eye }}" opacity="0.9"></path>
  </sc-if>
  <path d="M46 66 L50 72 L54 66 Q50 63 46 66Z" fill="{{ mask }}"></path>
  <sc-if value="{{ happy }}" hint-placeholder-val="{{ false }}">
    <path d="M43 75 Q50 81 57 75" stroke="{{ mask }}" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.45"></path>
  </sc-if>
  <circle cx="17" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <circle cx="23" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <circle cx="30" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <circle cx="70" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <circle cx="77" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <circle cx="83" cy="67" r="1.3" fill="{{ mask }}" opacity="0.26"></circle>
  <ellipse cx="50" cy="76" rx="17" ry="10" fill="#C8D0DC" opacity="0.3"></ellipse>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:88,&quot;height&quot;:88},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:80,&quot;min&quot;:16,&quot;max&quot;:200,&quot;tsType&quot;:&quot;number&quot;},&quot;mood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;calm&quot;,&quot;alert&quot;,&quot;happy&quot;,&quot;thinking&quot;,&quot;approved&quot;],&quot;default&quot;:&quot;calm&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;head&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#8C9AB2&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;mask&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#0C1525&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;ear&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#C4A090&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eye&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#CBA45E&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;pupil&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#04080F&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const mood = this.props.mood || 'calm';
    const squint = mood === 'thinking';
    return {
      size: this.props.size || 80,
      head: this.props.head || '#8C9AB2',
      mask: this.props.mask || '#0C1525',
      ear: this.props.ear || '#C4A090',
      eye: this.props.eye || '#CBA45E',
      pupil: this.props.pupil || '#04080F',
      alert: mood === 'alert',
      happy: mood === 'happy' || mood === 'approved',
      squint,
      sparkle: mood === 'approved',
      eyeR: squint ? 6 : 8,
      pupilR: squint ? 3.5 : 5,
    };
  }
}
</script>
</body>
</html>
