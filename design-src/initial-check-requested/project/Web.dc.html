<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#070B14">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Move">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){try{navigator.serviceWorker.register('sw.js').catch(function(){});}catch(e){}});}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070B14;font-family:'DM Sans',sans-serif;color:#EFF3FA}
a{text-decoration:none;color:inherit}
.wnav-links{display:flex;align-items:center;gap:6px}
.wnav-burger{display:none}
.w-stage>*{display:block;width:100%}
@media (max-width:820px){
  .wnav-links{position:fixed;top:60px;left:0;right:0;flex-direction:column;align-items:stretch;gap:2px;padding:12px 18px 16px;background:#0B1322;border-bottom:1px solid rgba(110,150,225,0.12);transform:translateY(-130%);transition:transform .28s ease;z-index:60}
  .wnav-links.open{transform:translateY(0)}
  .wnav-burger{display:flex}
}
</style>
</helmet>
<div style="min-height:100vh;background:#070B14">
  <!-- GLOBAL NAV -->
  <div style="position:sticky;top:0;z-index:70;backdrop-filter:blur(14px);background:rgba(7,11,20,0.82);border-bottom:1px solid rgba(110,150,225,0.12)">
    <div style="max-width:1180px;margin:0 auto;height:60px;padding:0 22px;display:flex;align-items:center;justify-content:space-between">
      <a onClick="{{ goHome }}" style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <div style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0E1A30,#070D1C);box-shadow:0 0 0 1px rgba(203,164,94,0.22)"><dc-import name="Raccoon" size="27" mood="calm" head="#8C9AB2" mask="#0C1525" ear="#C4A090" eye="#CBA45E" pupil="#04080F" hint-size="27px,27px"></dc-import></div>
        <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900">Move</span>
      </a>
      <div class="wnav-links {{ menuClass }}">
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="4">
          <a onClick="{{ l.go }}" style="padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;color:{{ l.col }};background:{{ l.bg }}">{{ l.label }}</a>
        </sc-for>
        <a onClick="{{ goLogin }}" style="padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;color:#EFF3FA;white-space:nowrap">Log in</a>
        <a onClick="{{ goOnb }}" style="padding:10px 18px;border-radius:11px;background:linear-gradient(135deg,#DCBC7C,#CBA45E);color:#0A0F1C;font-size:13.5px;font-weight:700;cursor:pointer;text-align:center">Get the app</a>
      </div>
      <button class="wnav-burger" onClick="{{ toggleMenu }}" style="width:40px;height:40px;border-radius:11px;align-items:center;justify-content:center;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;cursor:pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>

  <!-- ROUTED CONTENT -->
  <div class="w-stage">
    <sc-if value="{{ rHome }}" hint-placeholder-val="{{ true }}"><dc-import name="Move Web" hint-size="100%,1200px"></dc-import></sc-if>
    <sc-if value="{{ rFeatures }}" hint-placeholder-val="{{ false }}"><dc-import name="Web Features" hint-size="100%,1200px"></dc-import></sc-if>
    <sc-if value="{{ rWhy }}" hint-placeholder-val="{{ false }}"><dc-import name="Web Why-Free" hint-size="100%,800px"></dc-import></sc-if>
    <sc-if value="{{ rBlog }}" hint-placeholder-val="{{ false }}"><dc-import name="Web Blog" hint-size="100%,1100px"></dc-import></sc-if>
    <sc-if value="{{ rLogin }}" hint-placeholder-val="{{ false }}"><dc-import name="Web Login" hint-size="100%,720px"></dc-import></sc-if>
    <sc-if value="{{ rOnb }}" hint-placeholder-val="{{ false }}"><dc-import name="Web Onboarding" hint-size="100%,640px"></dc-import></sc-if>
    <sc-if value="{{ rApp }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; align-items:center; gap:14px; padding:34px 20px 48px; min-height:calc(100vh - 60px); background:radial-gradient(ellipse 60% 45% at 50% 0%,#14110b,#070B14 68%)">
        <div style="display:flex; align-items:center; gap:9px; color:#8A99B6; font-size:12.5px; font-weight:600"><span style="width:7px; height:7px; border-radius:50%; background:#54CB7E; box-shadow:0 0 8px #54CB7E"></span>Signed in as Liam Kutay · live app</div>
        <div style="border-radius:46px; box-shadow:0 40px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(203,164,94,0.14)"><dc-import name="Move" embed="true" hint-size="390px,844px"></dc-import></div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state={ route:'home', menu:false };
  componentDidMount(){
    this._sync=()=>{ const h=(location.hash||'').replace(/^#\/?/,'')||'home'; this.setState({route:h,menu:false}); };
    window.addEventListener('hashchange',this._sync);
    this._sync();
  }
  componentWillUnmount(){ if(this._sync) window.removeEventListener('hashchange',this._sync); }
  nav(r){ try{ location.hash = r==='home'?'#/':('#/'+r); }catch(e){} this.setState({route:r,menu:false}); }
  renderVals(){
    const r=this.state.route;
    const mk=(key,label)=>{ const on=r===key; return {label,go:()=>this.nav(key),col:on?'#CBA45E':'#8A99B6',bg:on?'rgba(203,164,94,0.10)':'transparent'}; };
    return {
      links:[ mk('features','Features'), mk('why-free','Why free'), mk('blog','Guides') ],
      menuClass:this.state.menu?'open':'',
      toggleMenu:()=>this.setState(s=>({menu:!s.menu})),
      goHome:()=>this.nav('home'), goLogin:()=>this.nav('login'), goOnb:()=>this.nav('onboarding'),
      rHome:r==='home', rFeatures:r==='features', rWhy:r==='why-free', rBlog:r==='blog', rLogin:r==='login', rOnb:r==='onboarding', rApp:r==='app',
    };
  }
}
</script>
</body>
</html>
