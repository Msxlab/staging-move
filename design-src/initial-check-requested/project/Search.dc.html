<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06080f;font-family:'DM Sans',sans-serif}input{font-family:inherit}.s-scroll{scrollbar-width:none}.s-scroll::-webkit-scrollbar{display:none}</style>
</helmet>
<div style="{{ outer }}">
  <div style="{{ frame }}">
    <sc-if value="{{ chrome }}"><div style="display:flex;justify-content:space-between;padding:14px 26px 4px;font-size:13px;font-weight:600;color:#EFF3FA"><span>9:41</span><span style="color:#41526F">▮▮▮ ▼</span></div></sc-if>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 22px 12px">
      <div style="flex:1;display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:14px;background:#121B2D;border:1px solid rgba(203,164,94,0.3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A99B6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input value="{{ q }}" onInput="{{ onInput }}" placeholder="Search services, tasks, addresses…" style="flex:1;background:none;border:none;outline:none;color:#EFF3FA;font-size:14px"/>
        <sc-if value="{{ hasQ }}" hint-placeholder-val="{{ false }}"><button onClick="{{ clear }}" style="background:none;border:none;color:#8A99B6;font-size:15px;cursor:pointer">✕</button></sc-if>
      </div>
    </div>
    <div class="s-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:4px 22px 28px">
      <sc-if value="{{ idle }}" hint-placeholder-val="{{ true }}">
        <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:8px 0 9px">Try</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
          <sc-for list="{{ chips }}" as="c" hint-placeholder-count="5"><button onClick="{{ c.go }}" style="padding:9px 14px;border-radius:99px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#8A99B6;font-size:12.5px;font-weight:500;cursor:pointer">{{ c.label }}</button></sc-for>
        </div>
      </sc-if>

      <sc-if value="{{ hasQ }}" hint-placeholder-val="{{ false }}">
        <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
          <div style="text-align:center;padding:48px 0;color:#41526F"><div style="font-size:32px">🔍</div><div style="color:#8A99B6;font-size:14px;font-weight:600;margin-top:12px">No results for “{{ q }}”</div><div style="font-size:12px;margin-top:4px">Try a service, task or address.</div></div>
        </sc-if>
        <sc-for list="{{ groups }}" as="g" hint-placeholder-count="3">
          <div style="margin-bottom:18px">
            <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px">{{ g.title }} · {{ g.n }}</div>
            <div style="display:flex;flex-direction:column;gap:9px">
              <sc-for list="{{ g.items }}" as="i" hint-placeholder-count="3">
                <div style="display:flex;align-items:center;gap:12px;padding:13px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12)">
                  <div style="width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:#18233A;font-size:16px">{{ i.icon }}</div>
                  <div style="flex:1;min-width:0"><div style="color:#EFF3FA;font-size:13.5px;font-weight:600">{{ i.title }}</div><div style="color:#41526F;font-size:11px">{{ i.sub }}</div></div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#41526F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </sc-if>
    </div>
    <sc-if value="{{ chrome }}"><div style="position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:99px;background:rgba(255,255,255,0.18)"></div></sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  state={ q:'' };
  setQ(v){ this.setState({q:v}); }
  renderVals(){
    const q=(this.state.q||'').trim().toLowerCase();
    const corpus=[
      {group:'Services',icon:'⚡',title:'Electric · Austin Energy',sub:'Active · transfer to ConEdison'},
      {group:'Services',icon:'⚡',title:'Electric · ConEdison',sub:'New home · needs setup'},
      {group:'Services',icon:'💧',title:'Water · Austin Water',sub:'Active · cancel at move-out'},
      {group:'Services',icon:'📡',title:'Internet · AT&T Fiber',sub:'Expiring Jul 28 · transfer'},
      {group:'Services',icon:'🔥',title:'Gas · CenterPoint Energy',sub:'Active · transfer'},
      {group:'Tasks',icon:'✅',title:'Transfer electric to new address',sub:'Due Sep 10 · Utilities'},
      {group:'Tasks',icon:'📬',title:'Forward mail with USPS',sub:'Due Jun 25 · Government'},
      {group:'Tasks',icon:'🚗',title:'Update driver’s license address',sub:'Due Jul 1 · Government'},
      {group:'Tasks',icon:'📦',title:'Book moving truck',sub:'Done · Logistics'},
      {group:'Addresses',icon:'🏠',title:'1234 Congress Ave',sub:'Austin, TX · current home'},
      {group:'Addresses',icon:'🏢',title:'560 5th Ave',sub:'New York, NY · moving to'},
      {group:'Providers',icon:'📡',title:'Verizon Fios',sub:'Internet · available at new home'},
      {group:'Providers',icon:'📡',title:'Spectrum',sub:'Internet · available at new home'},
      {group:'Guides',icon:'📰',title:'How to transfer your utilities',sub:'4 min read · Utilities'},
      {group:'Guides',icon:'📰',title:'DMV address change guide',sub:'7 min read · Government'},
    ];
    const matched = q ? corpus.filter(c=>(c.title+' '+c.sub+' '+c.group).toLowerCase().indexOf(q)>=0) : [];
    const order=['Services','Tasks','Addresses','Providers','Guides'];
    const groups = order.map(g=>{const items=matched.filter(m=>m.group===g);return {title:g,n:items.length,items};}).filter(g=>g.n>0);
    const chips=['electric','USPS','DMV','internet','New York','utilities'].map(label=>({label,go:()=>this.setQ(label)}));
    return {
      outer:this.props.embed?'height:100%;width:100%':'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,#14110b,#06080f 72%)',
      frame:this.props.embed?'position:relative;display:flex;flex-direction:column;height:100%;width:100%;background:#0A0F1C':'position:relative;width:390px;height:844px;border-radius:42px;overflow:hidden;background:#0A0F1C;border:1px solid rgba(110,150,225,0.10);box-shadow:0 40px 120px rgba(0,0,0,.6);display:flex;flex-direction:column',
      chrome:!this.props.embed,
      q:this.state.q, hasQ:!!q, idle:!q, noResults: !!q && groups.length===0,
      onInput:(e)=>this.setQ(e.target.value), clear:()=>this.setQ(''),
      chips, groups,
    };
  }
}
</script>
</body>
</html>
