<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06080f;font-family:'DM Sans',sans-serif}input{font-family:inherit}.i-scroll{scrollbar-width:none}.i-scroll::-webkit-scrollbar{display:none}@keyframes i-rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.i-rise{animation:i-rise .35s ease both}</style>
</helmet>
<div style="{{ outer }}">
  <div style="{{ frame }}">
    <sc-if value="{{ chrome }}"><div style="display:flex;justify-content:space-between;padding:14px 26px 4px;font-size:13px;font-weight:600;color:#EFF3FA"><span>9:41</span><span style="color:#41526F">▮▮▮ ▼</span></div></sc-if>
    <div class="i-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:8px 22px 28px">
      <div style="color:#EFF3FA;font-family:'Playfair Display',serif;font-size:25px;font-weight:800">Share this move</div>
      <div style="color:#8A99B6;font-size:11px;margin-top:2px;margin-bottom:18px">Plan together — everyone sees the same checklist.</div>

      <div style="display:flex;gap:9px">
        <input placeholder="partner@email.com" style="flex:1;padding:14px 15px;border-radius:13px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:14px;outline:none"/>
        <button style="padding:0 18px;border-radius:13px;background:linear-gradient(135deg,#DCBC7C,#CBA45E);color:#0A0F1C;font-size:14px;font-weight:700;border:none;cursor:pointer">Invite</button>
      </div>
      <button style="width:100%;margin-top:10px;padding:13px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:9px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#CBA45E;font-size:13px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v14"/></svg>Share invite link</button>

      <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:24px 0 10px">Members</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ members }}" as="m" hint-placeholder-count="3">
          <div class="i-rise" style="display:flex;align-items:center;gap:12px;padding:13px;border-radius:16px;background:#121B2D;border:1px solid rgba(110,150,225,0.12)">
            <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:{{ m.avBg }};color:{{ m.avCol }}">{{ m.initials }}</div>
            <div style="flex:1;min-width:0"><div style="color:#EFF3FA;font-size:14px;font-weight:600">{{ m.name }}</div><div style="color:#41526F;font-size:11px">{{ m.email }}</div></div>
            <span style="font-size:9.5px;font-weight:700;color:{{ m.roleCol }};background:{{ m.roleBg }};padding:4px 10px;border-radius:99px">{{ m.role }}</span>
          </div>
        </sc-for>
      </div>

      <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:24px 0 10px">Pending</div>
      <div class="i-rise" style="display:flex;align-items:center;gap:12px;padding:13px;border-radius:16px;background:#121B2D;border:1px dashed rgba(110,150,225,0.2)">
        <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#18233A;color:#8A99B6"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v5l3 2M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div style="flex:1;min-width:0"><div style="color:#EFF3FA;font-size:14px;font-weight:600">jordan@email.com</div><div style="color:#41526F;font-size:11px">Invited 2 days ago</div></div>
        <span style="font-size:9.5px;font-weight:700;color:#E0A85A;background:rgba(224,168,90,0.16);padding:4px 10px;border-radius:99px">Pending</span>
      </div>
    </div>
    <sc-if value="{{ chrome }}"><div style="position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:99px;background:rgba(255,255,255,0.18)"></div></sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  renderVals(){
    return {
      outer:this.props.embed?'height:100%;width:100%':'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,#14110b,#06080f 72%)', frame:this.props.embed?'position:relative;display:flex;flex-direction:column;height:100%;width:100%;background:#0A0F1C':'position:relative;width:390px;height:844px;border-radius:42px;overflow:hidden;background:#0A0F1C;border:1px solid rgba(110,150,225,0.10);box-shadow:0 40px 120px rgba(0,0,0,.6);display:flex;flex-direction:column', chrome:!this.props.embed,
      members:[
        {initials:'LK',name:'Liam Kutay (you)',email:'liam@example.com',role:'Owner',avBg:'linear-gradient(135deg,#DCBC7C,#CBA45E)',avCol:'#0A0F1C',roleCol:'#CBA45E',roleBg:'rgba(203,164,94,0.12)'},
        {initials:'MK',name:'Mia Kutay',email:'mia@example.com',role:'Editor',avBg:'#18233A',avCol:'#EFF3FA',roleCol:'#54CB7E',roleBg:'rgba(84,203,126,0.14)'},
        {initials:'RB',name:'Rob (mover)',email:'rob@summitmoving.com',role:'Viewer',avBg:'#18233A',avCol:'#EFF3FA',roleCol:'#8A99B6',roleBg:'rgba(255,255,255,0.05)'},
      ],
    };
  }
}
</script>
</body>
</html>
