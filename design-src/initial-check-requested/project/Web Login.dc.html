<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#070B14;font-family:'DM Sans',sans-serif}input{font-family:inherit}a{text-decoration:none}@media(max-width:820px){.login-split{grid-template-columns:1fr!important}.login-brand{display:none!important}}@keyframes l-glow{0%,100%{opacity:.4}50%{opacity:.8}}</style>
</helmet>
<div class="login-split" style="min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:#070B14;color:#EFF3FA;position:relative;overflow:hidden">
  <!-- left brand panel -->
  <div class="login-brand" style="position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:46px;background:linear-gradient(150deg,#0E1828,#0a1120);overflow:hidden">
    <div style="position:absolute;top:-160px;left:-80px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(203,164,94,0.12),transparent 65%);animation:l-glow 8s ease-in-out infinite"></div>
    <div style="display:flex;align-items:center;gap:11px;position:relative">
      <div style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0E1A30,#070D1C);box-shadow:0 0 0 1px rgba(203,164,94,0.22)"><dc-import name="Raccoon" size="32" mood="calm" head="#8C9AB2" mask="#0C1525" ear="#C4A090" eye="#CBA45E" pupil="#04080F" hint-size="32px,32px"></dc-import></div>
      <span style="font-family:'Playfair Display',serif;font-size:23px;font-weight:900">Move</span>
    </div>
    <div style="position:relative">
      <h1 style="font-family:'Playfair Display',serif;font-size:42px;font-weight:900;line-height:1.1;max-width:420px">Welcome back to your move.</h1>
      <p style="color:#8A99B6;font-size:16px;line-height:1.6;margin-top:16px;max-width:400px">48 days to New York — your dossier, services and reminders are right where you left them.</p>
    </div>
    <div style="position:relative;color:#41526F;font-size:12.5px">★★★★★ 4.9 · 100% free, no subscription</div>
  </div>
  <!-- right form -->
  <div style="display:flex;align-items:center;justify-content:center;padding:46px">
    <div style="width:100%;max-width:380px">
      <div style="font-family:'Playfair Display',serif;font-size:30px;font-weight:800">Sign in</div>
      <div style="color:#8A99B6;font-size:14px;margin-top:6px">New here? <a href="#" style="color:#CBA45E;font-weight:600">Create a free account</a></div>
      <div style="display:flex;flex-direction:column;gap:11px;margin-top:26px">
        <input type="email" placeholder="Email address" style="padding:15px 16px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:14px;outline:none"/>
        <input type="password" placeholder="Password" style="padding:15px 16px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:14px;outline:none"/>
        <a href="#" style="align-self:flex-end;color:#CBA45E;font-size:12.5px;font-weight:600">Forgot password?</a>
      </div>
      <button style="width:100%;margin-top:18px;padding:16px;border-radius:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#DCBC7C,#CBA45E,#B0852F);color:#0A0F1C;border:none;cursor:pointer;box-shadow:0 10px 30px rgba(203,164,94,0.28)" onClick="{{ goApp }}">Sign in</button>
      <div style="display:flex;align-items:center;gap:12px;margin:22px 0"><div style="flex:1;height:1px;background:rgba(110,150,225,0.12)"></div><span style="color:#41526F;font-size:11px">or</span><div style="flex:1;height:1px;background:rgba(110,150,225,0.12)"></div></div>
      <div style="display:flex;gap:10px">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;background:#fff;color:#0A0F1C;font-size:13.5px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="#0A0F1C"><path d="M16.4 12.2c0-1.6 1.3-2.4 1.4-2.4-.8-1.1-2-1.3-2.4-1.3-1-.1-2 .6-2.5.6s-1.3-.6-2.2-.6c-1.1 0-2.2.7-2.7 1.7-1.2 2-.3 5 .8 6.6.5.8 1.2 1.7 2 1.6.8 0 1.1-.5 2.1-.5s1.2.5 2.1.5 1.4-.8 1.9-1.6c.6-.9.9-1.8.9-1.8s-1.8-.7-1.9-2.8zM14.7 6.7c.5-.6.8-1.4.7-2.2-.7 0-1.5.5-2 1-.4.5-.8 1.3-.7 2 .8.1 1.6-.4 2-.8z"/></svg>Apple</div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);color:#EFF3FA;font-size:13.5px;font-weight:600;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.6a4.8 4.8 0 01-2.1 3.2v2.6h3.4c2-1.8 3.1-4.5 3.1-7.6z"/><path fill="#34A853" d="M12 22c2.7 0 5-1 6.6-2.5l-3.4-2.6c-.9.6-2 1-3.2 1-2.5 0-4.6-1.7-5.4-4H3.1v2.6A10 10 0 0012 22z"/><path fill="#FBBC05" d="M6.6 13.9a6 6 0 010-3.8V7.5H3.1a10 10 0 000 9z"/><path fill="#EA4335" d="M12 6.1c1.4 0 2.7.5 3.7 1.5l2.7-2.7A10 10 0 003.1 7.5l3.5 2.6c.8-2.3 2.9-4 5.4-4z"/></svg>Google</div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:720}}">
class Component extends DCLogic { renderVals(){ return { goApp:()=>{ try{ window.location.hash='#/app'; }catch(e){} } }; } }
</script>
</body>
</html>
