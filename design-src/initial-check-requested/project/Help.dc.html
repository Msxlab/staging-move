<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06080f;font-family:'DM Sans',sans-serif}.h-scroll{scrollbar-width:none}.h-scroll::-webkit-scrollbar{display:none}@keyframes h-rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.h-rise{animation:h-rise .35s ease both}</style>
</helmet>
<div style="{{ outer }}">
  <div style="{{ frame }}">
    <sc-if value="{{ chrome }}"><div style="display:flex;justify-content:space-between;padding:14px 26px 4px;font-size:13px;font-weight:600;color:#EFF3FA"><span>9:41</span><span style="color:#41526F">▮▮▮ ▼</span></div></sc-if>
    <div class="h-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:8px 22px 28px">
      <div style="color:#EFF3FA;font-family:'Playfair Display',serif;font-size:25px;font-weight:800">Help &amp; support</div>
      <div style="color:#8A99B6;font-size:11px;margin-top:2px;margin-bottom:16px">We usually reply within a few hours.</div>
      <div style="display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#41526F" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span style="color:#41526F;font-size:14px">Search help articles…</span>
      </div>

      <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:22px 0 10px">Popular topics</div>
      <div style="display:flex;flex-direction:column;gap:9px">
        <sc-for list="{{ topics }}" as="t" hint-placeholder-count="5">
          <button onClick="{{ t.go }}" class="h-rise" style="display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12);text-align:left;cursor:pointer;width:100%">
            <span style="font-size:18px">{{ t.icon }}</span>
            <span style="flex:1;color:#EFF3FA;font-size:13.5px;font-weight:600">{{ t.label }}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#41526F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </sc-for>
      </div>

      <sc-if value="{{ hasTickets }}" hint-placeholder-val="{{ true }}">
        <div style="color:#8A99B6;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:24px 0 10px">Your tickets</div>
        <div style="display:flex;flex-direction:column;gap:9px">
          <sc-for list="{{ tickets }}" as="k" hint-placeholder-count="2">
            <div class="h-rise" style="padding:14px;border-radius:14px;background:#121B2D;border:1px solid rgba(110,150,225,0.12)">
              <div style="display:flex;align-items:center;justify-content:space-between"><span style="color:#EFF3FA;font-size:13px;font-weight:600">{{ k.subject }}</span><span style="font-size:9px;font-weight:700;color:{{ k.col }};background:{{ k.bg }};padding:3px 9px;border-radius:99px">{{ k.status }}</span></div>
              <div style="color:#41526F;font-size:11px;margin-top:5px">#{{ k.id }} · updated {{ k.updated }}</div>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <button style="width:100%;margin-top:26px;padding:16px;border-radius:16px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#DCBC7C,#CBA45E,#B0852F);color:#0A0F1C;border:none;cursor:pointer;box-shadow:0 8px 28px rgba(203,164,94,0.28);display:flex;align-items:center;justify-content:center;gap:9px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0A0F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Contact support</button>
      <div style="text-align:center;color:#41526F;font-size:11px;margin-top:14px">Move v2.1.0 · or email hello@locateflow.com</div>
    </div>
    <sc-if value="{{ chrome }}"><div style="position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:99px;background:rgba(255,255,255,0.18)"></div></sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  renderVals(){
    return {
      outer:this.props.embed?'height:100%;width:100%':'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,#14110b,#06080f 72%)', frame:this.props.embed?'position:relative;display:flex;flex-direction:column;height:100%;width:100%;background:#0A0F1C':'position:relative;width:390px;height:844px;border-radius:42px;overflow:hidden;background:#0A0F1C;border:1px solid rgba(110,150,225,0.10);box-shadow:0 40px 120px rgba(0,0,0,.6);display:flex;flex-direction:column', chrome:!this.props.embed,
      topics:[
        {icon:'⚡',label:'Transferring & setting up utilities',go:()=>{}},
        {icon:'📬',label:'Mail forwarding with USPS',go:()=>{}},
        {icon:'🏛',label:'Updating your address with the DMV',go:()=>{}},
        {icon:'🧾',label:'How the Home Dossier data works',go:()=>{}},
        {icon:'🔒',label:'Account, privacy & data export',go:()=>{}},
      ],
      hasTickets:true,
      tickets:[
        {id:'4821',subject:'Internet plan didn’t transfer',status:'Open',updated:'2h ago',col:'#E0A85A',bg:'rgba(224,168,90,0.16)'},
        {id:'4790',subject:'Dossier missing for my ZIP',status:'Resolved',updated:'3d ago',col:'#54CB7E',bg:'rgba(84,203,126,0.14)'},
      ],
    };
  }
}
</script>
</body>
</html>
