<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_tokens.css"/>
<style>
html,body{margin:0;font-family:var(--font-sans);height:100%;}
.wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100%;position:relative;}
.wrap::after{content:"";position:absolute;top:14px;bottom:14px;left:50%;width:1px;background:linear-gradient(180deg,transparent,rgba(128,128,128,0.2),transparent);}
.pane{padding:22px 24px;box-sizing:border-box;background:var(--bg);color:var(--fg);display:flex;flex-direction:column;gap:12px;}
.kicker{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-3);}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-weight:600;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:4px;border:1px solid currentColor;}
.badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.badge.active{color:var(--sage);}
.badge.moving{color:var(--terracotta);}
.badge.due{color:var(--brass);}
.badge.archived{color:var(--fg-3);}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-display);font-style:italic;font-weight:500;font-size:12px;padding:4px 12px;border-radius:999px;}
.pill.premium{background:var(--fg);color:var(--bg);}
</style></head>
<body>
<div class="wrap">
  <div class="pane lf-dark">
    <div class="kicker">Status · Dark</div>
    <div class="row">
      <span class="badge active"><span class="dot"></span>Active</span>
      <span class="badge moving"><span class="dot"></span>Moving</span>
      <span class="badge due"><span class="dot"></span>Due soon</span>
      <span class="badge archived"><span class="dot"></span>Archived</span>
    </div>
    <div class="row">
      <span class="pill premium">✦ Premium</span>
    </div>
  </div>
  <div class="pane lf-light">
    <div class="kicker">Status · Light</div>
    <div class="row">
      <span class="badge active"><span class="dot"></span>Active</span>
      <span class="badge moving"><span class="dot"></span>Moving</span>
      <span class="badge due"><span class="dot"></span>Due soon</span>
      <span class="badge archived"><span class="dot"></span>Archived</span>
    </div>
    <div class="row">
      <span class="pill premium">✦ Premium</span>
    </div>
  </div>
</div>
</body></html>
