<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  .card { padding: 20px 24px; }
  .row { display: flex; gap: 10px; }
  .swatch { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .chip { height: 46px; border-radius: 8px; }
  .chip-name { font-size: 11px; color: var(--fg-1); font-weight: 600; }
  .chip-code { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#fff7ed;"></div><div class="chip-name">50</div><div class="chip-code">#fff7ed</div></div>
    <div class="swatch"><div class="chip" style="background:#ffedd5;"></div><div class="chip-name">100</div><div class="chip-code">#ffedd5</div></div>
    <div class="swatch"><div class="chip" style="background:#fed7aa;"></div><div class="chip-name">200</div><div class="chip-code">#fed7aa</div></div>
    <div class="swatch"><div class="chip" style="background:#fdba74;"></div><div class="chip-name">300</div><div class="chip-code">#fdba74</div></div>
    <div class="swatch"><div class="chip" style="background:#fb923c;"></div><div class="chip-name">400</div><div class="chip-code">#fb923c</div></div>
    <div class="swatch"><div class="chip" style="background:#f97316;"></div><div class="chip-name" style="color:#fff;">500</div><div class="chip-code">#f97316</div></div>
    <div class="swatch"><div class="chip" style="background:#ea580c;"></div><div class="chip-name" style="color:#fff;">600</div><div class="chip-code">#ea580c</div></div>
    <div class="swatch"><div class="chip" style="background:#c2410c;"></div><div class="chip-name" style="color:#fff;">700</div><div class="chip-code">#c2410c</div></div>
    <div class="swatch"><div class="chip" style="background:#9a3412;"></div><div class="chip-name" style="color:#fff;">800</div><div class="chip-code">#9a3412</div></div>
    <div class="swatch"><div class="chip" style="background:#7c2d12;"></div><div class="chip-name" style="color:#fff;">900</div><div class="chip-code">#7c2d12</div></div>
  </div>
</div>
</body>
</html>
