<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  .card { padding: 20px 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .r { height: 56px; border: 1px dashed rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.03); }
  .lbl { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 6px; text-align: center; }
  .item { display:flex; flex-direction: column; }
</style>
</head>
<body>
<div class="card">
  <div class="item"><div class="r" style="border-radius:8px;"></div><div class="lbl">sm · 8</div></div>
  <div class="item"><div class="r" style="border-radius:12px;"></div><div class="lbl">md · 12</div></div>
  <div class="item"><div class="r" style="border-radius:16px;"></div><div class="lbl">lg · 16</div></div>
  <div class="item"><div class="r" style="border-radius:20px;"></div><div class="lbl">xl · 20</div></div>
  <div class="item"><div class="r" style="border-radius:24px;"></div><div class="lbl">2xl · 24</div></div>
  <div class="item"><div class="r" style="border-radius:9999px;"></div><div class="lbl">full · pill</div></div>
</div>
</body>
</html>
