<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); height: 100%; }
  .stage {
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 1.05fr 1.3fr 1fr;
    gap: 28px;
    align-items: center;
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 120px;
  }
  .cell .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }

  /* ── Mark (animated) ─────────────────── */
  .mark {
    width: 84px;
    height: 84px;
    display: block;
  }
  .ripple1, .ripple2, .ripple3 {
    transform-origin: 32px 28px;
    transform-box: fill-box;
  }
  .ripple1 { animation: ripple 2.4s cubic-bezier(.3,.7,.4,1) infinite; }
  .ripple2 { animation: ripple 2.4s cubic-bezier(.3,.7,.4,1) infinite .6s; }
  .ripple3 { animation: ripple 2.4s cubic-bezier(.3,.7,.4,1) infinite 1.2s; }
  @keyframes ripple {
    0%   { transform: scale(.35); opacity: 0; }
    15%  { opacity: .9; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .pin-body {
    transform-origin: 32px 28px;
    transform-box: fill-box;
    animation: float 3.8s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  .pin-dot {
    transform-origin: center;
    transform-box: fill-box;
    animation: dotPulse 2.4s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(.75); }
  }

  .sweep {
    stroke-dasharray: 160;
    stroke-dashoffset: 160;
    animation: sweep 2.4s linear infinite;
  }
  @keyframes sweep {
    0%   { stroke-dashoffset: 160; }
    60%  { stroke-dashoffset: 0;   }
    100% { stroke-dashoffset: -160;}
  }

  /* ── Wordmark ────────────────────────── */
  .lockup {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .wordmark {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1;
    background: linear-gradient(92deg, #f97316 0%, #f59e0b 30%, #ec4899 60%, #8b5cf6 90%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    animation: sheen 6s ease-in-out infinite;
  }
  @keyframes sheen {
    0%, 100% { background-position: 0% 0%; }
    50%      { background-position: 100% 0%; }
  }
  .wordmark .flow { font-weight: 500; opacity: .92; }

  /* ── Mini / mono variants ────────────── */
  .minis { display: flex; gap: 14px; align-items: center; }
  .mini {
    width: 44px; height: 44px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .mini-grad { background: linear-gradient(135deg, #f97316, #ec4899 55%, #8b5cf6); }
  .mini-dark { background: #111827; border: 1px solid rgba(255,255,255,0.08); }
  .mini-light { background: #fff; }

  .divider {
    width: 1px;
    height: 96px;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1), transparent);
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Animated primary mark -->
  <div class="cell">
    <svg class="mark" viewBox="0 0 64 64" aria-label="LocateFlow animated mark">
      <defs>
        <linearGradient id="pinFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#f97316"/>
          <stop offset="55%" stop-color="#ec4899"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="rippleFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>

      <!-- flow ripples emanating from the pin base -->
      <circle class="ripple1" cx="32" cy="28" r="10" fill="none" stroke="url(#rippleFill)" stroke-width="2"/>
      <circle class="ripple2" cx="32" cy="28" r="10" fill="none" stroke="url(#rippleFill)" stroke-width="2" opacity=".8"/>
      <circle class="ripple3" cx="32" cy="28" r="10" fill="none" stroke="url(#rippleFill)" stroke-width="2" opacity=".6"/>

      <!-- pin: teardrop with inner dot -->
      <g class="pin-body">
        <path d="M32 8 C22 8 14 15.6 14 25.4 C14 36 24 48 32 56 C40 48 50 36 50 25.4 C50 15.6 42 8 32 8 Z"
              fill="url(#pinFill)"/>
        <!-- inner accent stroke (sweeping) -->
        <path class="sweep"
              d="M20 24 A12 12 0 0 1 44 24"
              fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
        <circle class="pin-dot" cx="32" cy="25" r="5.2" fill="#fff"/>
      </g>
    </svg>
    <span class="tag">MARK · ANIMATED</span>
  </div>

  <!-- Wordmark lockup -->
  <div class="cell">
    <div class="lockup">
      <svg class="mark" style="width:56px;height:56px;" viewBox="0 0 64 64">
        <circle class="ripple1" cx="32" cy="28" r="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
        <circle class="ripple2" cx="32" cy="28" r="10" fill="none" stroke="#ec4899" stroke-width="2" opacity=".8"/>
        <g class="pin-body">
          <path d="M32 8 C22 8 14 15.6 14 25.4 C14 36 24 48 32 56 C40 48 50 36 50 25.4 C50 15.6 42 8 32 8 Z" fill="url(#pinFill)"/>
          <circle class="pin-dot" cx="32" cy="25" r="5.2" fill="#fff"/>
        </g>
        <defs>
          <linearGradient id="pinFill" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#f97316"/>
            <stop offset="55%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="wordmark">Locate<span class="flow">flow</span></div>
    </div>
    <span class="tag">PRIMARY LOCKUP</span>
  </div>

  <!-- Mono / app-icon variants -->
  <div class="cell">
    <div class="minis">
      <div class="mini mini-grad" title="App icon — gradient">
        <svg width="26" height="26" viewBox="0 0 64 64">
          <path d="M32 8 C22 8 14 15.6 14 25.4 C14 36 24 48 32 56 C40 48 50 36 50 25.4 C50 15.6 42 8 32 8 Z" fill="#fff"/>
          <circle cx="32" cy="25" r="5.2" fill="#ec4899"/>
        </svg>
      </div>
      <div class="mini mini-dark" title="On dark">
        <svg width="24" height="24" viewBox="0 0 64 64">
          <path d="M32 8 C22 8 14 15.6 14 25.4 C14 36 24 48 32 56 C40 48 50 36 50 25.4 C50 15.6 42 8 32 8 Z" fill="url(#pinFill)"/>
          <circle cx="32" cy="25" r="5.2" fill="#fff"/>
        </svg>
      </div>
      <div class="mini mini-light" title="On light">
        <svg width="24" height="24" viewBox="0 0 64 64">
          <path d="M32 8 C22 8 14 15.6 14 25.4 C14 36 24 48 32 56 C40 48 50 36 50 25.4 C50 15.6 42 8 32 8 Z" fill="#111827"/>
          <circle cx="32" cy="25" r="5.2" fill="#f97316"/>
        </svg>
      </div>
    </div>
    <span class="tag">APP ICON · MONO</span>
  </div>

</div>

</body>
</html>
