name: Scheduled cron jobs

# Triggers the app's /api/cron/* endpoints on the production deployment.
#
# WHY: production runs on DigitalOcean App Platform, which does NOT run the
# self-hosted ofelia scheduler (docker-compose.prod.yml + docker/ofelia.ini are
# for a self-hosted Docker host only). Without this, trial expiry, seat/billing
# reconciliation, reminders, purges, etc. never run. This workflow replaces the
# ofelia scheduler from a free, version-controlled GitHub Actions cron.
#
# SETUP (one-time): add a repository secret named CRON_SECRET whose value equals
# the CRON_SECRET in the DigitalOcean app env (Settings → Secrets and variables →
# Actions → New repository secret). The /api/cron/* routes reject requests whose
# Bearer token does not match.
#
# Times are UTC. GitHub cron has ~5 min granularity and may be delayed a few
# minutes under load — fine for these jobs.
#
# COST GUARD: GitHub Actions' free minute pool is not a real scheduler budget.
# A */5 Ubuntu job burns thousands of minutes per month before CI even runs.
# Keep the GitHub fallback scheduler hourly and use a dedicated scheduler
# (DigitalOcean job/worker, cron-job.org, or similar) for sub-hourly production
# dispatch if the product needs tighter latency.

on:
  schedule:
    - cron: "0 * * * *" # hourly fallback: cleanup, connector dispatch, scheduled delivery, blog publish, uptime check
    - cron: "15 3 * * *" # daily 03:15: stripe-reconcile, workspace-purge, provider-stats, blog-cleanup, blog-image-cleanup (R2 orphan prune)
    - cron: "0 6 * * *" # daily 06:00: non-user-facing daily jobs (trial-check, admin digest, admin backup, data-retention)
    # ── Daily user-facing reminder batch, fired once per US-zone-hour so each
    # user is reminded at ~8am LOCAL instead of 1–3am. Each run scans all
    # candidates but only ACTS on users whose resolved local hour is exactly 8
    # (gate in the routes); the per-day dedupe keys make any cross-run overlap a
    # no-op. The strict local-hour=8 gate is DST-correct on its own: as zones
    # shift offset twice a year the matching UTC run just changes (e.g. Eastern
    # is 12:00 UTC in EDT, 13:00 UTC in EST). We therefore schedule EVERY whole
    # UTC hour that can be local-8am for a US zone in EITHER DST or standard time
    # (offsets -4 EDT … -10 HST → UTC hours 12…18), so no zone is ever dropped.
    # (These same slots also fire the daily-digest ROLLUP — see the hit block.)
    - cron: "0 12 * * *" # local 8am at UTC-4 (Eastern, EDT)
    - cron: "0 13 * * *" # local 8am at UTC-5 (Eastern EST / Central CDT)
    - cron: "0 14 * * *" # local 8am at UTC-6 (Central CST / Mountain MDT)
    - cron: "0 15 * * *" # local 8am at UTC-7 (Mountain MST / Pacific PDT)
    - cron: "0 16 * * *" # local 8am at UTC-8 (Pacific PST / Alaska AKDT)
    - cron: "0 17 * * *" # local 8am at UTC-9 (Alaska AKST)
    - cron: "0 18 * * *" # local 8am at UTC-10 (Hawaii HST, no DST)
    # Weekly digest fires DAILY: users can pick ANY weekday as their digest
    # day, and the route self-gates (digestDay === today's US weekday), so a
    # Monday-only schedule silently skipped every non-Monday preference.
    - cron: "0 9 * * *" # daily 09:00: weekly-digest (route gates per-user digestDay)
    - cron: "0 10 1 * *" # 1st of month: monthly-report (user emails) + admin-monthly-report (owner PDF)
    - cron: "0 4 * * 0" # Sundays: data-retention
  workflow_dispatch: {}

permissions: {}

jobs:
  cron:
    runs-on: ubuntu-latest
    env:
      WEB: https://locateflow.com
      ADMIN: https://admin.locateflow.com
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SCHED: ${{ github.event.schedule }}
    steps:
      - name: Trigger cron endpoints
        run: |
          set -uo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set — cron endpoints will 401. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          fail=0
          hit() {
            url="$1"; method="${2:-GET}"
            code=$(curl -sS -X "$method" -m 60 \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "  $method $url -> $code"
            case "$code" in 2*) ;; *) fail=1 ;; esac
          }
          echo "Schedule: ${SCHED:-manual}"
          case "${SCHED:-manual}" in
            "0 * * * *")
              hit "$WEB/api/cron/checkout-cleanup"
              hit "$WEB/api/cron/connector-dispatch"
              hit "$WEB/api/cron/scheduled-delivery"
              hit "$WEB/api/cron/blog-publish"
              hit "$WEB/api/cron/store-review-accounts"
              hit "$WEB/api/cron/uptime-check"
              ;;
            "15 3 * * *")
              hit "$WEB/api/cron/stripe-reconcile"
              hit "$WEB/api/cron/workspace-purge"
              hit "$WEB/api/cron/provider-stats" POST
              hit "$WEB/api/cron/blog-cleanup"
              # Prune orphaned R2 blog images (admin host). Without this entry
              # the cleanup never runs in prod (DigitalOcean does not run the
              # self-hosted ofelia scheduler) and unreferenced R2 objects
              # accumulate without bound.
              hit "$ADMIN/api/cron/blog-image-cleanup" POST
              ;;
            "0 6 * * *")
              # Non-user-facing daily jobs. These are NOT time-of-day sensitive
              # for the end user (trial-check is a subscription state machine +
              # seat reconcile; admin digest/backup go to the operator), so they
              # stay on one fixed slot. The user-facing reminder batch moved to
              # the per-zone 12–18 UTC slots below.
              hit "$WEB/api/cron/trial-check"
              hit "$WEB/api/cron/admin-daily-digest"
              # Admin DB backup (admin host) + web data-retention sweep run with
              # the daily batch so they don't depend on the weekly Sunday slot
              # alone — backup is daily, and data-retention is safe to run daily.
              hit "$ADMIN/api/cron/backup" POST
              hit "$WEB/api/cron/data-retention"
              ;;
            "0 12 * * *"|"0 13 * * *"|"0 14 * * *"|"0 15 * * *"|"0 16 * * *"|"0 17 * * *"|"0 18 * * *")
              # Daily user-facing reminder batch, fired once per US zone so each
              # user is reminded at ~8am LOCAL. The routes self-gate to users
              # whose resolved local hour is ~8, so it's safe to hit every
              # endpoint on every one of these runs — a user in another zone is
              # simply skipped this run and picked up by their zone's run. The
              # existing per-day dedupe keys guarantee at-most-once even if a
              # user matched two runs (DST seam / off-grid tz).
              hit "$WEB/api/cron/bill-reminders"
              hit "$WEB/api/cron/bill-overdue"
              hit "$WEB/api/cron/task-reminders"
              hit "$WEB/api/cron/move-reminders"
              hit "$WEB/api/cron/contract-reminders"
              hit "$WEB/api/cron/lifecycle-nudges"
              # Move-week weather push: NWS move-day forecast for plans moving
              # in <=3 days. Push-only (not part of the daily-digest rollup);
              # self-gates on local-8am + per-plan-per-day dedupe like the rest.
              hit "$WEB/api/cron/move-week-alerts"
              # Daily reminder ROLLUP. Same per-zone local-8am slots as the
              # per-item reminders above. When DAILY_DIGEST_ENABLED is on, the
              # five crons above write only their in-app feed entries and
              # SUPPRESS their per-item email/push; this digest then sends ONE
              # rollup email + ONE rollup push per user covering the same items.
              # When the flag is off it's a no-op. Hit it LAST so the per-item
              # in-app entries already exist; the per-user-per-day dedupe key
              # keeps it at-most-once across the multiple zone runs.
              hit "$WEB/api/cron/daily-digest"
              ;;
            "0 9 * * *") hit "$WEB/api/cron/weekly-digest" ;;
            "0 10 1 * *")
              hit "$WEB/api/cron/monthly-report"
              # Owner's monthly business report PDF, emailed to the
              # admin-digest recipient set (per-recipient monthly dedupe).
              hit "$WEB/api/cron/admin-monthly-report"
              ;;
            "0 4 * * 0") hit "$WEB/api/cron/data-retention" ;;
            *)
              echo "Manual/dispatch run — smoke-testing the critical jobs:"
              hit "$WEB/api/cron/trial-check"
              hit "$WEB/api/cron/stripe-reconcile"
              ;;
          esac
          if [ "$fail" -ne 0 ]; then echo "::error::one or more cron endpoints returned a non-2xx status"; exit 1; fi

  # ── Synthetic uptime monitor ───────────────────────────────────────────────
  # Calls /api/cron/uptime-check, which probes the public surfaces server-side
  # (locateflow.com home + marker, /api/health, admin login) with 5s timeouts,
  # emails the admin-alert recipients on any failure (deduped to once per UTC
  # day per target), and records availability telemetry under source "uptime".
  #
  # Kept here as disabled historical context only. The active hourly `cron`
  # job above calls /api/cron/uptime-check so scheduled Actions minutes are not
  # doubled by a second job.
  #
  # Deliberately NO continue-on-error and default failure visibility: when the
  # web app is fully down, the route hosting the monitor cannot run (or email),
  # this curl gets a non-2xx, the job FAILS, and GitHub's default
  # workflow-failure notification email is the backstop alert for total outage.
  uptime:
    # Disabled as a separate GitHub job to avoid doubling scheduled Actions
    # minutes. The hourly `cron` job calls /api/cron/uptime-check instead.
    if: false
    runs-on: ubuntu-latest
    env:
      WEB: https://locateflow.com
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Probe public surfaces via /api/cron/uptime-check
        run: |
          set -uo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set — uptime-check will 401. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Self-gate the 5-minute slot to quarter-hour boundaries. GH cron
          # jitter can occasionally push a run past its window and skip one
          # cycle — acceptable for a free monitor (next boundary catches up).
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && [ $(( 10#$(date -u +%M) % 15 )) -ge 5 ]; then
            echo "Not a quarter-hour boundary — skipping (runs at :00/:15/:30/:45)."
            exit 0
          fi
          code=$(curl -sS -m 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o /tmp/uptime.json -w "%{http_code}" "$WEB/api/cron/uptime-check" || echo "000")
          echo "GET $WEB/api/cron/uptime-check -> $code"
          cat /tmp/uptime.json 2>/dev/null || true; echo
          case "$code" in
            2*) ;;
            *)
              echo "::error::uptime-check call itself failed ($code) — the web app may be fully down. This job failure (GitHub's workflow-failure notification) is the backstop alert."
              exit 1
              ;;
          esac
