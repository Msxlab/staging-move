name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default. Individual jobs that need write scopes
# (e.g. uploading release artifacts, commenting on PRs) should opt in
# explicitly with their own `permissions:` block.
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: TypeScript (web)
        run: pnpm --filter @locateflow/web exec tsc --noEmit

      - name: TypeScript (admin)
        run: pnpm --filter @locateflow/admin exec tsc --noEmit

      - name: TypeScript (mobile)
        run: pnpm --filter @locateflow/mobile lint

      - name: Prisma validate
        run: pnpm --filter @locateflow/db exec prisma validate
        env:
          # prisma validate resolves env("DATABASE_URL") even though it never
          # connects to the DB; with the var unset it fails P1012 and red-fails
          # this job on every non-main push. A syntactically-valid placeholder
          # is enough (no database contact happens).
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action lists the PR's commits via the REST API on
      # pull_request events; without this it 403s in seconds.
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the PR's full commit range; the default shallow
          # clone makes `base^..head` an unknown revision.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit
        # Gate on the PRODUCTION dependency graph only. Dev tooling (eas-cli,
        # build chains) carries transitive advisories that can't always be
        # forced and never ships to the runtime. Full-graph audit stays
        # available locally via `pnpm audit --audit-level=high`.
        run: pnpm audit --prod --audit-level=high

      - name: Check for secrets in tracked files
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests (web)
        run: pnpm --filter @locateflow/web test

      - name: Run tests (admin)
        run: pnpm --filter @locateflow/admin test

      - name: Run tests (mobile)
        run: pnpm --filter @locateflow/mobile test

  migrate:
    name: Prisma Migrate (status only)
    runs-on: ubuntu-latest
    # CI is not the production migration owner. It only verifies that the
    # checked-in migrations are in a deployable state; the deploy environment
    # owns `prisma migrate deploy` so schema and app rollout stay coupled.
    needs: [lint-and-typecheck, test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma migrate status
        run: pnpm --filter @locateflow/db exec prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  provider-guards:
    name: Provider Data Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Provider seed audit
        run: pnpm audit:providers

      - name: Provider coverage audit
        run: pnpm audit:providers:coverage

      - name: State provider completeness audit
        run: pnpm audit:providers:state-completeness

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @locateflow/web exec playwright install --with-deps chromium webkit

      - name: Verify required secrets are set
        env:
          USER_JWT_SECRET: ${{ secrets.USER_JWT_SECRET }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
        run: |
          if [ -z "$USER_JWT_SECRET" ] || [ -z "$ADMIN_JWT_SECRET" ]; then
            echo "::error::USER_JWT_SECRET and ADMIN_JWT_SECRET must be configured as repository secrets. Inline fallbacks were removed because they shipped a known JWT secret to anyone who could read this workflow file."
            exit 1
          fi

      - name: Run Playwright tests
        run: pnpm --filter @locateflow/web e2e
        env:
          USER_JWT_SECRET: ${{ secrets.USER_JWT_SECRET }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14
