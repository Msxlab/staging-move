# ---------------------------------------------------------------
# LocateFlow - Dokploy one-off DB copy compose
#
# Temporary compose target for SSH-less database rehearsal/final restore.
# It keeps the Dokploy MySQL service running and adds a one-shot dbcopy
# service that streams a DigitalOcean MySQL dump directly into the Dokploy
# MySQL container.
#
# Required target env:
# - MYSQL_ROOT_PASSWORD
# - MYSQL_DATABASE
# - MYSQL_USER
# - MYSQL_PASSWORD
#
# Required source env:
# - SOURCE_MYSQL_HOST
# - SOURCE_MYSQL_PORT
# - SOURCE_MYSQL_USER
# - SOURCE_MYSQL_PASSWORD
# - SOURCE_MYSQL_DATABASE
#
# Do not commit real env values.
# ---------------------------------------------------------------

name: ${DOKPLOY_COMPOSE_PROJECT_NAME:?DOKPLOY_COMPOSE_PROJECT_NAME is required, e.g. locateflow-staging}

x-count-sql: &count-sql |
  SELECT '_prisma_migrations' AS table_name, COUNT(*) AS row_count FROM `_prisma_migrations`
  UNION ALL SELECT 'RuntimeConfigEntry', COUNT(*) FROM `RuntimeConfigEntry`
  UNION ALL SELECT 'User', COUNT(*) FROM `User`
  UNION ALL SELECT 'AdminUser', COUNT(*) FROM `AdminUser`
  UNION ALL SELECT 'Subscription', COUNT(*) FROM `Subscription`
  UNION ALL SELECT 'Address', COUNT(*) FROM `Address`
  UNION ALL SELECT 'ServiceProvider', COUNT(*) FROM `ServiceProvider`
  UNION ALL SELECT 'SavedProvider', COUNT(*) FROM `SavedProvider`
  UNION ALL SELECT 'UserCustomProvider', COUNT(*) FROM `UserCustomProvider`
  UNION ALL SELECT 'MoveTask', COUNT(*) FROM `MoveTask`
  UNION ALL SELECT 'EmailLog', COUNT(*) FROM `EmailLog`
  UNION ALL SELECT 'ConnectorDispatch', COUNT(*) FROM `ConnectorDispatch`
  UNION ALL SELECT 'AddressChangeEvent', COUNT(*) FROM `AddressChangeEvent`
  ORDER BY table_name;

  SELECT
    'RuntimeConfigEntry_active' AS metric,
    COUNT(*) AS count
  FROM `RuntimeConfigEntry`
  WHERE `isActive` = TRUE;

services:
  web:
    image: busybox:1.36
    container_name: ${DOKPLOY_CONTAINER_PREFIX:?DOKPLOY_CONTAINER_PREFIX is required, e.g. locateflow-staging}-web
    restart: unless-stopped
    expose:
      - "3000"
    command:
      - sh
      - -ec
      - |
        mkdir -p /www
        printf '%s\n' 'LocateFlow maintenance' > /www/index.html
        httpd -f -p 3000 -h /www

  admin:
    image: busybox:1.36
    container_name: ${DOKPLOY_CONTAINER_PREFIX:?DOKPLOY_CONTAINER_PREFIX is required, e.g. locateflow-staging}-admin
    restart: unless-stopped
    expose:
      - "3001"
    command:
      - sh
      - -ec
      - |
        mkdir -p /www
        printf '%s\n' 'LocateFlow admin maintenance' > /www/index.html
        httpd -f -p 3001 -h /www

  imgproxy:
    image: busybox:1.36
    container_name: ${DOKPLOY_CONTAINER_PREFIX:?DOKPLOY_CONTAINER_PREFIX is required, e.g. locateflow-staging}-imgproxy
    restart: unless-stopped
    expose:
      - "8080"
    command:
      - sh
      - -ec
      - |
        mkdir -p /www
        printf '%s\n' 'LocateFlow image service maintenance' > /www/index.html
        httpd -f -p 8080 -h /www

  mysql:
    image: mysql:8.0
    container_name: ${DOKPLOY_CONTAINER_PREFIX:?DOKPLOY_CONTAINER_PREFIX is required, e.g. locateflow-staging}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
      - --slow-query-log=1
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dbcopy:
    image: mysql:8.0
    container_name: ${DOKPLOY_CONTAINER_PREFIX:?DOKPLOY_CONTAINER_PREFIX is required, e.g. locateflow-staging}-dbcopy
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      SOURCE_MYSQL_HOST: ${SOURCE_MYSQL_HOST:?SOURCE_MYSQL_HOST is required}
      SOURCE_MYSQL_PORT: ${SOURCE_MYSQL_PORT:?SOURCE_MYSQL_PORT is required}
      SOURCE_MYSQL_USER: ${SOURCE_MYSQL_USER:?SOURCE_MYSQL_USER is required}
      SOURCE_MYSQL_PASSWORD: ${SOURCE_MYSQL_PASSWORD:?SOURCE_MYSQL_PASSWORD is required}
      SOURCE_MYSQL_DATABASE: ${SOURCE_MYSQL_DATABASE:?SOURCE_MYSQL_DATABASE is required}
      COUNT_SQL: *count-sql
    command:
      - sh
      - -ec
      - |
        printf '%s\n' "$${COUNT_SQL}" > /tmp/locateflow-counts.sql

        echo "SOURCE_COUNTS_BEGIN"
        mysql \
          --ssl-mode=REQUIRED \
          -h "$${SOURCE_MYSQL_HOST}" \
          -P "$${SOURCE_MYSQL_PORT}" \
          -u "$${SOURCE_MYSQL_USER}" \
          -p"$${SOURCE_MYSQL_PASSWORD}" \
          "$${SOURCE_MYSQL_DATABASE}" \
          < /tmp/locateflow-counts.sql
        echo "SOURCE_COUNTS_END"

        echo "RESTORE_BEGIN"
        mysqldump \
          --ssl-mode=REQUIRED \
          -h "$${SOURCE_MYSQL_HOST}" \
          -P "$${SOURCE_MYSQL_PORT}" \
          -u "$${SOURCE_MYSQL_USER}" \
          -p"$${SOURCE_MYSQL_PASSWORD}" \
          --single-transaction \
          --routines \
          --triggers \
          --events \
          --hex-blob \
          --set-gtid-purged=OFF \
          --default-character-set=utf8mb4 \
          --column-statistics=0 \
          "$${SOURCE_MYSQL_DATABASE}" \
          | mysql \
              -h mysql \
              -P 3306 \
              -u root \
              -p"$${MYSQL_ROOT_PASSWORD}" \
              --default-character-set=utf8mb4 \
              "$${MYSQL_DATABASE}"
        echo "RESTORE_END"

        echo "TARGET_COUNTS_BEGIN"
        mysql \
          -h mysql \
          -P 3306 \
          -u root \
          -p"$${MYSQL_ROOT_PASSWORD}" \
          "$${MYSQL_DATABASE}" \
          < /tmp/locateflow-counts.sql
        echo "TARGET_COUNTS_END"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    name: ${DOKPLOY_MYSQL_VOLUME_NAME:?DOKPLOY_MYSQL_VOLUME_NAME is required, e.g. locateflow-staging_mysql_data}
